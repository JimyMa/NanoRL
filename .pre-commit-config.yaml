repos:
  - repo: https://github.com/omnilib/ufmt
    rev: v2.9.0
    hooks:
      - id: ufmt
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: end-of-file-fixer
      - id: requirements-txt-fixer
      - id: check-merge-conflict
      - id: fix-encoding-pragma
        args: ["--remove"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.9
    hooks:
      - id: mdformat
        args: ["--number"]
        additional_dependencies:
          - mdformat-openmmlab
          - mdformat_frontmatter
          - linkify-it-py

  - repo: https://github.com/codespell-project/codespell
    rev: v2.1.0
    hooks:
      - id: codespell
        args: ["-L", "CANN,cann,crate"]
        exclude: >
          (?x)^(
              .*/docs/imgs/.*|
              .*/json\.hpp|
              .*/pybind_json\.hpp
          )$

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: fmt (NanoRoute)
        args: ["--manifest-path", "NanoRoute/Cargo.toml"]
        files: ^NanoRoute/
        pass_filenames: false
      # NanoRoute
      - id: cargo-check
        name: cargo check (NanoRoute)
        args: ["--manifest-path", "NanoRoute/Cargo.toml"]
        files: ^NanoRoute/
      - id: clippy
        name: clippy (NanoRoute)
        args: ["--manifest-path", "NanoRoute/Cargo.toml", "--", "-D", "warnings"]
        files: ^NanoRoute/

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.6
    hooks:
      - id: clang-format
        args: ["--style=file"]
        files: \.(cpp|hpp|c|h|cu|cuh)$
        exclude: '(?i).*(json|jring|dlpack|gloo|ibgda_device\.cuh).*'

